<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ЛЁН — RON-informed concept задач оператора</title>
    <style>
      * { box-sizing: border-box; }
      html, body, iframe { width: 100%; height: 100%; margin: 0; }
      body { overflow: hidden; background: #e9ebeb; }
      iframe { display: block; border-width: 0; }
    </style>
  </head>
  <body>
    <iframe id="concept" src="./operator-tasks-v2.html" title="Концепт задач оператора ЛЁН"></iframe>
    <script>
      const frame = document.querySelector("#concept");
      frame.addEventListener("load", () => {
        const documentRoot = frame.contentDocument;
        const stylesheet = documentRoot.createElement("link");
        stylesheet.rel = "stylesheet";
        stylesheet.href = "./operator-tasks-v3.css";
        documentRoot.head.append(stylesheet);
        const objectImage = documentRoot.querySelector(".photo img");
        objectImage.src = "../../public/assets/operator-task-bin-v1.png";
        objectImage.alt = "Тара с готовыми деталями на стойке A";
      });
    </script>
  </body>
</html>
